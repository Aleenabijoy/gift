<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Aneena ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="header">
        <h1>Today is Aneena's birthday 🎉</h1>

        <img id="bff-img" src="images/aneena.jpg" alt="Aneena">

        <h2 id="bday-age">23 years old</h2>

        <h4 id="bday-date">15.07.2026</h4>
    </div>

    <div class="gift-section">
        <h2 class="gift-title">Here's how happy I am for you today 🥳</h2>
        <h3 class="gift-hint">Hover or tap the gift 🎁</h3>

        <div class="gift-img" id="gift-img-happy"></div>
    </div>

    <div class="gift-section">
        <h2 class="gift-title">How people react when you enter the room 😍</h2>

        <div class="gift-img" id="gift-img-hot"></div>
    </div>

    <div class="gift-section">
        <h2 class="gift-title">If I had to describe you with ONE word 👇</h2>

        <div class="gift-img" id="gift-img-genius"></div>
    </div>

    <div class="gift-section">
        <h2 class="gift-title">The only person as badass as you 💪</h2>

        <div class="gift-img" id="gift-img-badass"></div>
    </div>

    <div class="gift-section">
        <h2 class="gift-title">This one's for you, my friend 🥂</h2>

        <div class="gift-img" id="gift-img-messi"></div>
    </div>

    <script>
        const gifts = {
            "gift-img-happy": "images/happy.gif",
            "gift-img-hot": "images/hot.gif",
            "gift-img-genius": "images/genius.gif",
            "gift-img-badass": "images/badass.gif",
            "gift-img-messi": "images/messi.gif"
        };

        Object.keys(gifts).forEach(id => {
            const gift = document.getElementById(id);

            gift.addEventListener("click", () => {
                if (gift.classList.contains("opened")) {
                    gift.style.backgroundImage = 'url("images/gift-cover.jpg")';
                    gift.classList.remove("opened");
                } else {
                    gift.style.backgroundImage = `url("${gifts[id]}")`;
                    gift.classList.add("opened");
                }
            });
        });
    </script>

</body>

</html>
